<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vonnie's Weather App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="welcome">
      <h1>Welcome to the Weather App</h1>
    </div>
    <header>
      <form class="search-bar" id="search-bar">
        <input
          type="search"
          class="search-input"
          placeholder="Enter a city..."
          required
          id="searched-city"
        />
        <input type="submit" class="search-button" value="Search" />
      </form>
    </header>
    <div class="date">Saturday 3/14 5:27 PM</div>
    <div class="weather-info">
      <div class="country-info">
        <span class="city-name" id="city">Washington DC</span>
        <span class="country"> United States of America</span>
      </div>
      <span class="city-icon" id="weather-icon">⛅ </span>
      <br />
      <span class="city-temp" id="city-temp">53° F</span>

      <div class="feels-like-line">
        Feels like: <span id="actual-temp">46</span>°
      </div>

      <p class="more-info">
        <span class="wind-info">
          Wind: <span class="wind-speed" id="wind-speed"> 14 </span>mph
          <span class="humidity-level">
            Humidty: <span id="humid">10</span>%</span
          >
        </span>
      </p>
    </div>
    <footer>
      Coded by

      <a href="https://github.com/Vlove21" target="_blank"> Vonnie Love</a>,
      code hosted on
      <a href="https://github.com/Vlove21/weather-app" target="_blank"
        >Github</a
      >
      and website hosted on
      <a href="https://loveweather-app.netlify.app/" target="_blank">Netlify</a>
    </footer>
    <script src="src/script.js"></script>
  </body>
</html>

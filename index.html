<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vonnie's Weather App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="welcome">
      <h1>Welcome to the Weather App</h1>
    </div>
    <header>
      <form class="search-bar" id="search-bar">
        <input
          type="search"
          class="search-input"
          placeholder="Enter a city..."
          required
          id="searched-city"
        />
        <input type="submit" class="search-button" value="Search" />
      </form>
    </header>
    <div class="date" id="date"></div>
    <div class="weather-info">
      <div class="country-info">
        <span class="city-name" id="city"></span>
        <span class="country" id="country"></span>
      </div>
      <div class="city-icon" id="weather-icon"></div>
      <br />
      <span class="city-temp"><span id="city-temp"></span>° F</span>

      <div class="feels-like-line">
        Feels like: <span id="actual-temp"></span>°
      </div>

      <p class="more-info">
        <span class="wind-info">
          Wind: <span class="wind-speed" id="wind-speed"> </span> mph
          <span class="humidity-level">
            Humidty: <span id="humid"></span>%</span
          >
        </span>
      </p>

      <div class="forecast">
        <div class="forecast-date">Sun</div>
        <div class="forecast-icon">☀️</div>
        <div class="forecast-temps">
          <div class="forecast-temp">34°</div>
          <div class="forecast-temp">54°</div>
        </div>
      </div>
    </div>
    <footer>
      Coded by

      <a href="https://github.com/Vlove21" target="_blank"> Vonnie Love</a>,
      hosted on
      <a href="https://github.com/Vlove21/weather-app" target="_blank"
        >Github</a
      >
      and website hosted on
      <a href="https://lovesweather-app.netlify.app/" target="_blank"
        >Netlify</a
      >
    </footer>
    <script src="src/script.js"></script>
  </body>
</html>

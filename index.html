<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vonnie's Weather App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <div class="welcome">
      <h1>Welcome!</h1>
    </div>
    <div class="weather-info">
    <header>
      <form class="search-bar" id="search-bar">
        <input
          type="search"
          class="search-input"
          placeholder="Enter a city..."
          required
          id="searched-city"
        />
        <input type="submit" class="search-button" value="Search" />
      </form>
    </header>
    
      <div class="date" id="date"></div>
      <div class="weather-info-dets">
        <div class="date" id="date"></div>
        <div class="main-weather-info">
          <div class="country-info">
            <span class="city-name" id="city"></span>
            <span class="country" id="country"></span>
          </div>
          <div class="city-icon" id="weather-icon"></div>
          <br />
          <span class="city-temp"><span id="city-temp"></span>° F</span>

          <div class="feels-like-line">
            Feels like: <span id="actual-temp"></span>°
          </div>

          <p class="more-info">
            <span class="wind-info">
              Wind: <span class="wind-speed" id="wind-speed"> </span> mph
              <span class="humidity-level">
                Humidty: <span id="humid"></span>%</span
              >
            </span>
          </p>
          <br />
          <div class="current-conditions" id="conditions">It is currently misty with a chance of rain</div>
